<!doctype html>
<html lang="en">
  <head>
    <title>Jelly</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body id="sound2">
    <div class="headerbox">
        <div class="buttonside">
            <a href="../index.html">Ocean</a>
            <a href="./jelly.html">Jelly</a>
        </div>
    </div>
    <h1>
      <p>Underwater Jelly</p>
    </h1>
    <!-- <model-viewer> HTML element -->
    <model-viewer auto-rotate src="jelly.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="0" autoplay>
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
      <button id="sound" class="textbutton" slot="hotspot-hand" data-position="-0.54 0.93 0.1" data-normal="-0.73 0.05 0.69">Hi</button>
      <button slot="ar-button" id="ar-button">
          View in your space
      </button>
      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js"></script>
    <h1>
      <a href="https://www.fontspace.com/drybrush-font-f141209">Link for font</a>
      <a href="https://pixabay.com/sound-effects/film-special-effects-bubble-pop-293342/">Link for sound</a>
    </h1>
    <script src="./soundscript2.js"></script>
  </body>
</html>
